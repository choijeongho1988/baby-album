<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>우리 아기 앨범</title>
<style>
  :root{
    --bg:#fdf6f0;
    --bg2:#fbeef3;
    --card:#ffffff;
    --pink:#f7c5d6;
    --pink-deep:#e89bb4;
    --mint:#c7e7d8;
    --mint-deep:#8fc9b0;
    --lav:#d9d3ef;
    --yellow:#fbe7b4;
    --text:#5b5256;
    --text-soft:#9a8e92;
    --line:#f0e3e9;
    --shadow:0 8px 26px rgba(214,170,190,.22);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",system-ui,sans-serif;
    color:var(--text);
    background:linear-gradient(160deg,var(--bg) 0%,var(--bg2) 100%);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:760px;margin:0 auto;padding:0 16px 120px}

  header.app{
    text-align:center;
    padding:30px 16px 18px;
  }
  .babyname{
    font-size:26px;font-weight:800;letter-spacing:-.5px;
    color:var(--text);
    display:inline-flex;align-items:center;gap:8px;
    cursor:pointer;border-radius:14px;padding:4px 12px;
    transition:background .15s;
  }
  .babyname:hover{background:#fff6}
  .babyname small{font-size:13px;color:var(--text-soft);font-weight:500}
  .subtitle{margin-top:6px;color:var(--text-soft);font-size:13px}
  .heart{color:var(--pink-deep)}
  .syncstatus{
    margin-top:10px;font-size:12px;color:var(--text-soft);min-height:16px;
    display:inline-flex;align-items:center;gap:6px;
  }
  .syncstatus.ok{color:var(--mint-deep);font-weight:700}
  .syncstatus.err{color:var(--pink-deep);font-weight:700}

  .toolbar{
    display:flex;gap:10px;justify-content:center;flex-wrap:wrap;
    margin-top:18px;
  }
  .btn{
    border:none;cursor:pointer;font-family:inherit;font-weight:700;
    font-size:15px;color:var(--text);
    background:var(--pink);
    padding:13px 22px;border-radius:999px;
    box-shadow:var(--shadow);
    transition:transform .12s, filter .15s;
    display:inline-flex;align-items:center;gap:7px;
  }
  .btn:active{transform:scale(.96)}
  .btn:hover{filter:brightness(1.03)}
  .btn.ghost{background:#fff;color:var(--text-soft);box-shadow:0 2px 10px rgba(0,0,0,.05)}

  .empty{
    text-align:center;margin-top:60px;color:var(--text-soft);
    line-height:1.9;
  }
  .empty .big{font-size:54px}

  .day{
    background:var(--card);
    border-radius:24px;
    box-shadow:var(--shadow);
    margin-top:24px;
    overflow:hidden;
  }
  .day-head{
    display:flex;align-items:center;gap:12px;
    padding:18px 20px 14px;
  }
  .day-date{font-size:18px;font-weight:800;letter-spacing:-.3px}
  .day-sub{font-size:12px;color:var(--text-soft);margin-top:2px}
  .day-dot{
    width:12px;height:12px;border-radius:50%;flex:none;
    background:var(--pink);
  }
  .day-count{
    margin-left:auto;font-size:12px;color:var(--text-soft);
    background:var(--bg2);padding:5px 11px;border-radius:999px;font-weight:600;
  }

  .grid{
    display:grid;grid-template-columns:repeat(3,1fr);gap:6px;
    padding:0 10px 6px;
  }
  @media(max-width:480px){.grid{grid-template-columns:repeat(2,1fr)}}
  .photo{
    position:relative;aspect-ratio:1/1;border-radius:14px;overflow:hidden;
    background:var(--bg2);cursor:pointer;
  }
  .photo img{width:100%;height:100%;object-fit:cover;display:block}
  .photo .del{
    position:absolute;top:6px;right:6px;width:26px;height:26px;border-radius:50%;
    background:rgba(0,0,0,.45);color:#fff;border:none;cursor:pointer;
    font-size:14px;line-height:1;opacity:0;transition:opacity .15s;
  }
  .photo:hover .del{opacity:1}
  .photo .more{
    position:absolute;inset:0;border:none;cursor:pointer;
    background:rgba(60,45,55,.52);color:#fff;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
    font-family:inherit;
  }
  .photo .more b{font-size:21px;font-weight:800;line-height:1.1}
  .photo .more span{font-size:11px;font-weight:600;opacity:.9}
  .photo .more *{pointer-events:none}
  .collapse{
    display:block;margin:2px auto 10px;border:none;cursor:pointer;
    background:var(--bg2);color:var(--text-soft);font-weight:700;font-family:inherit;
    border-radius:999px;padding:7px 18px;font-size:13px;
  }

  .comments{padding:6px 20px 20px}
  .comment{
    display:flex;gap:10px;align-items:flex-start;
    background:var(--bg);border-radius:16px;padding:11px 14px;margin-top:8px;
  }
  .comment .ava{
    width:30px;height:30px;border-radius:50%;flex:none;
    background:var(--mint);display:flex;align-items:center;justify-content:center;
    font-size:15px;
  }
  .comment .body{flex:1;min-width:0}
  .comment .txt{font-size:14px;line-height:1.5;white-space:pre-wrap;word-break:break-word}
  .comment .time{font-size:11px;color:var(--text-soft);margin-top:3px}
  .comment .cdel{
    border:none;background:none;color:var(--text-soft);cursor:pointer;
    font-size:12px;flex:none;padding:2px 4px;
  }
  .comment .cdel:hover{color:var(--pink-deep)}

  .addcomment{display:flex;gap:8px;margin-top:12px}
  .addcomment input{
    flex:1;border:1.5px solid var(--line);border-radius:14px;
    padding:11px 14px;font-size:14px;font-family:inherit;color:var(--text);
    background:#fff;outline:none;transition:border .15s;
  }
  .addcomment input:focus{border-color:var(--pink-deep)}
  .addcomment button{
    border:none;background:var(--mint-deep);color:#fff;font-weight:700;
    border-radius:14px;padding:0 18px;cursor:pointer;font-size:14px;font-family:inherit;
  }

  /* lightbox */
  .lb{
    position:fixed;inset:0;background:rgba(70,50,60,.82);
    display:none;align-items:center;justify-content:center;z-index:50;padding:20px;
  }
  .lb.show{display:flex}
  .lb img{max-width:100%;max-height:88vh;border-radius:16px;box-shadow:0 10px 50px rgba(0,0,0,.5)}
  .lb .x{
    position:absolute;top:18px;right:20px;color:#fff;font-size:30px;cursor:pointer;
    background:none;border:none;line-height:1;
  }

  /* date picker modal */
  .modal{
    position:fixed;inset:0;background:rgba(70,50,60,.45);
    display:none;align-items:center;justify-content:center;z-index:60;padding:20px;
  }
  .modal.show{display:flex}
  .sheet{
    background:#fff;border-radius:22px;padding:24px;max-width:340px;width:100%;
    box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center;
  }
  .sheet h3{margin:0 0 6px;font-size:18px}
  .sheet p{margin:0 0 16px;color:var(--text-soft);font-size:13px}
  .sheet input[type=date],.sheet input[type=text]{
    width:100%;border:1.5px solid var(--line);border-radius:14px;
    padding:12px;font-size:15px;font-family:inherit;color:var(--text);outline:none;text-align:center;
  }
  .sheet input:focus{border-color:var(--pink-deep)}
  .sheet .row{display:flex;gap:10px;margin-top:18px}
  .sheet .row .btn{flex:1;justify-content:center;padding:12px}

  .toast{
    position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--text);color:#fff;padding:11px 20px;border-radius:999px;
    font-size:14px;opacity:0;transition:.25s;z-index:80;pointer-events:none;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>

<div class="wrap">
  <header class="app">

      <button class="btn" id="addBtn">＋ 사진 추가</button>

<script>
/* ===== 설정 =====
   구글 드라이브 자동 저장을 쓰려면 아래 CLIENT_ID 를
   본인의 구글 OAuth 클라이언트 ID 로 바꿔주세요. (안내서 참고)
*/
const CLIENT_ID = "719745914765-ceof50r3kpscdp2fvhdqeb0a1v43fuur.apps.googleusercontent.com";

const STORE_KEY = "babyAlbum.v1";
const DRIVE_FLAG = "babyAlbum.drive";
const DRIVE_SCOPE = "https://www.googleapis.com/auth/drive.appdata";
const DRIVE_FILE = "baby-album.json";
const dotColors = ["#f7c5d6","#c7e7d8","#d9d3ef","#fbe7b4","#f9cfc0"];

let data = load();
let tokenClient=null, accessToken=null, driveFileId=null, syncTimer=null;

function load(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return { name:"우리 아기 앨범", photos:[], comments:{}, updatedAt:0 };
}
function saveLocal(){
  try{
    if(driveConnected()){
      // 드라이브가 원본 저장소 — 기기엔 사진을 쌓지 않고 가벼운 정보만 캐시(저장 공간 안 참)
      const light = Object.assign({}, data, {photos:[], _light:true});
      localStorage.setItem(STORE_KEY, JSON.stringify(light));
    }else{
      delete data._light;
      localStorage.setItem(STORE_KEY, JSON.stringify(data));
    }
  }catch(e){
    // 미연결 상태에서 기기 한도를 넘기면 사진 제외 후 저장 + 안내
    try{ localStorage.setItem(STORE_KEY, JSON.stringify(Object.assign({}, data, {photos:[], _light:true}))); }catch(e2){}
    if(!driveConnected())
      toast("이 기기 저장 공간이 가득 찼어요 😢 구글 연결을 권장해요");
  }
}
function save(){
  data.updatedAt = Date.now();
  saveLocal();
  scheduleSync();
}

/* ===== 구글 드라이브 연동 ===== */
const TOKEN_KEY = "babyAlbum.tok";
function driveConfigured(){ return CLIENT_ID && !CLIENT_ID.startsWith("여기에"); }
function driveConnected(){ return localStorage.getItem(DRIVE_FLAG)==="1"; }

// 액세스 토큰을 1시간 동안 재사용 — 새로고침마다 팝업이 뜨지 않게
function storeToken(resp){
  accessToken = resp.access_token;
  const expiry = Date.now() + ((resp.expires_in?resp.expires_in:3500)*1000) - 60000;
  try{ localStorage.setItem(TOKEN_KEY, JSON.stringify({t:accessToken, e:expiry})); }catch(e){}
}
function loadCachedToken(){
  try{
    const o = JSON.parse(localStorage.getItem(TOKEN_KEY)||"null");
    if(o && o.t && o.e > Date.now()){ accessToken=o.t; return true; }
  }catch(e){}
  return false;
}
function haveToken(){ return !!accessToken || loadCachedToken(); }

function setSync(msg, kind){
  const el=document.getElementById("syncStatus");
  if(!el) return;
  el.textContent=msg||"";
  el.className="syncstatus"+(kind==="ok"?" ok":kind==="err"?" err":"");
}

function whenGoogleReady(cb){
  if(window.google && google.accounts && google.accounts.oauth2) return cb();
  let n=0;
  const t=setInterval(()=>{
    if(window.google && google.accounts && google.accounts.oauth2){ clearInterval(t); cb(); }
    else if(++n>50){ clearInterval(t); }
  },150);
}

function getToken(interactive){
  return new Promise((resolve,reject)=>{
    if(!driveConfigured()) return reject("noconfig");
    if(!window.google || !google.accounts) return reject("nogis");
    if(!tokenClient){
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID, scope: DRIVE_SCOPE, callback: ()=>{}
      });
    }
    tokenClient.callback = (resp)=>{
      if(resp && resp.access_token){ storeToken(resp); resolve(accessToken); }
      else reject(resp);
    };
    try{ tokenClient.requestAccessToken({prompt: interactive ? "consent" : ""}); }
    catch(e){ reject(e); }
  });
}

async function driveFind(){
  const q = encodeURIComponent("name='"+DRIVE_FILE+"'");
  const r = await fetch("https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&fields=files(id,name)&q="+q,
    {headers:{Authorization:"Bearer "+accessToken}});
  if(!r.ok) throw new Error("find "+r.status);
  const j = await r.json();
  driveFileId = (j.files && j.files[0]) ? j.files[0].id : null;
  return driveFileId;
}
async function driveDownload(){
  if(!driveFileId) return null;
  const r = await fetch("https://www.googleapis.com/drive/v3/files/"+driveFileId+"?alt=media",
    {headers:{Authorization:"Bearer "+accessToken}});
  if(!r.ok) return null;
  try{ return await r.json(); }catch(e){ return null; }
}
async function driveUpload(obj){
  const meta = driveFileId ? {} : {name:DRIVE_FILE, parents:["appDataFolder"]};
  const boundary = "babybnd"+Date.now();
  const body =
    "--"+boundary+"\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n"+JSON.stringify(meta)+"\r\n"+
    "--"+boundary+"\r\nContent-Type: application/json\r\n\r\n"+JSON.stringify(obj)+"\r\n"+
    "--"+boundary+"--";
  const url = driveFileId
    ? "https://www.googleapis.com/upload/drive/v3/files/"+driveFileId+"?uploadType=multipart"
    : "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart";
  const r = await fetch(url,{
    method: driveFileId ? "PATCH":"POST",
    headers:{Authorization:"Bearer "+accessToken,"Content-Type":"multipart/related; boundary="+boundary},
    body
  });
  if(!r.ok) throw new Error("upload "+r.status);
  const j = await r.json();
  if(j.id) driveFileId=j.id;
  return j;
}

// 드라이브에서 내려받아 화면 갱신 (force=true면 로컬보다 오래됐어도 덮어씀)
async function pullFromDrive(force){
  await driveFind();
  const remote = await driveDownload();
  if(remote && (force || (remote.updatedAt||0) > (data.updatedAt||0))){
    data = remote; saveLocal(); render();
  }
}

// 사용자가 '구글 연결'을 직접 누를 때만 동의 팝업이 뜸
function connectDrive(){
  if(!driveConfigured()){
    toast("먼저 안내서대로 구글 클라이언트 ID를 넣어주세요");
    setSync("구글 연결 설정 필요 — 안내서 참고", "err");
    return;
  }
  setSync("연결 중…");
  whenGoogleReady(async ()=>{
    try{
      await getToken(true);
      const wasLight = !!data._light;
      await pullFromDrive(wasLight);
      if(!driveFileId) await driveUpload(data);   // 드라이브에 파일이 없으면 새로 올림
      localStorage.setItem(DRIVE_FLAG,"1");
      render();
      setSync("구글 드라이브 연결됨 ✓ 자동 저장 중", "ok");
      toast("구글 드라이브에 연결됐어요 ☁️");
    }catch(e){
      setSync("연결 실패 — '☁ 구글 연결'을 다시 눌러주세요", "err");
    }
  });
}

// 새로고침 시: 저장된 토큰이 살아있으면 팝업 없이 조용히 동기화, 없으면 안내만
function restoreDrive(){
  if(!driveConnected() || !driveConfigured()) return;
  if(!haveToken()){
    setSync("구글 다시 연결이 필요해요 — '☁ 구글 연결' 클릭", "err");
    return;
  }
  whenGoogleReady(async ()=>{
    try{
      await pullFromDrive(!!data._light);
      setSync("구글 드라이브 연결됨 ✓ 자동 저장 중", "ok");
    }catch(e){
      setSync("구글 다시 연결이 필요해요 — '☁ 구글 연결' 클릭", "err");
    }
  });
}

// 변경 후 자동 업로드 — 토큰이 살아있을 때만(팝업 절대 안 띄움)
function scheduleSync(){
  if(!driveConnected() || !driveConfigured()) return;
  clearTimeout(syncTimer);
  syncTimer = setTimeout(()=>{
    if(!haveToken()){
      setSync("변경됨 · 저장하려면 '☁ 구글 연결' 클릭", "err");
      return;
    }
    whenGoogleReady(async ()=>{
      try{
        setSync("동기화 중…");
        if(!driveFileId) await driveFind();
        await driveUpload(data);
        setSync("구글 드라이브 연결됨 ✓ 자동 저장 중", "ok");
      }catch(e){
        setSync("저장 실패 · '☁ 구글 연결' 다시 클릭", "err");
      }
    });
  }, 1500);
}

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

function fmtDate(d){
  const [y,m,day] = d.split("-").map(Number);
  const wk = ["일","월","화","수","목","금","토"][new Date(y,m-1,day).getDay()];
  return `${y}년 ${m}월 ${day}일 (${wk})`;
}
function todayStr(){
  const t=new Date(); const p=n=>String(n).padStart(2,"0");
  return `${t.getFullYear()}-${p(t.getMonth()+1)}-${p(t.getDate())}`;
}

/* ---- read photo's own date (EXIF capture date, fallback file date) ---- */
function dateFromTimestamp(ms){
  const t=new Date(ms); const p=n=>String(n).padStart(2,"0");
  return `${t.getFullYear()}-${p(t.getMonth()+1)}-${p(t.getDate())}`;
}
function getPhotoDate(file){
  return new Promise(res=>{
    const reader = new FileReader();
    reader.onload = ()=>{
      try{
        const exif = parseExifDate(reader.result);
        if(exif) return res(exif);
      }catch(e){}
      // fallback: file's last-modified date
      res(dateFromTimestamp(file.lastModified || Date.now()));
    };
    reader.onerror = ()=> res(dateFromTimestamp(file.lastModified || Date.now()));
    // only need the header for EXIF
    reader.readAsArrayBuffer(file.slice(0, 256*1024));
  });
}
function parseExifDate(buffer){
  const view = new DataView(buffer);
  if(view.getUint16(0)!==0xFFD8) return null;        // not a JPEG
  const len = view.byteLength;
  let off = 2;
  while(off+4 < len){
    const marker = view.getUint16(off);
    if(marker===0xFFE1){                              // APP1 (Exif)
      return readExif(view, off+4);
    }
    if((marker & 0xFF00)!==0xFF00) break;
    off += 2 + view.getUint16(off+2);
  }
  return null;
}
function readExif(view, start){
  if(view.getUint32(start)!==0x45786966) return null; // "Exif"
  const tiff = start + 6;
  const little = view.getUint16(tiff)===0x4949;
  const u16=(o)=>view.getUint16(o,little);
  const u32=(o)=>view.getUint32(o,little);
  if(u16(tiff+2)!==0x002A) return null;
  const ifd0 = tiff + u32(tiff+4);
  const readDir=(dir)=>{
    const n=u16(dir); const tags={};
    for(let i=0;i<n;i++){
      const e=dir+2+i*12;
      tags[u16(e)] = e;
    }
    return {n, tags};
  };
  const asciiAt=(entryOff)=>{
    const count=u32(entryOff+4);
    let valOff = entryOff+8;
    if(count>4) valOff = tiff + u32(entryOff+8);
    let s="";
    for(let i=0;i<count-1;i++) s+=String.fromCharCode(view.getUint8(valOff+i));
    return s;
  };
  const d0=readDir(ifd0);
  let dateStr=null;
  // jump into Exif sub-IFD for DateTimeOriginal (0x9003)
  if(d0.tags[0x8769]){
    const exifIfd = tiff + u32(d0.tags[0x8769]+8);
    const de=readDir(exifIfd);
    if(de.tags[0x9003]) dateStr=asciiAt(de.tags[0x9003]);
    else if(de.tags[0x9004]) dateStr=asciiAt(de.tags[0x9004]);
  }
  if(!dateStr && d0.tags[0x0132]) dateStr=asciiAt(d0.tags[0x0132]); // DateTime
  if(!dateStr) return null;
  const m = dateStr.match(/^(\d{4})[:\-](\d{2})[:\-](\d{2})/);
  return m ? `${m[1]}-${m[2]}-${m[3]}` : null;
}

/* ---- image compression ---- */
function compress(file){
  return new Promise(res=>{
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = ()=>{
      const max = 1000;
      let {width:w, height:h} = img;
      if(w>h && w>max){ h=Math.round(h*max/w); w=max; }
      else if(h>=w && h>max){ w=Math.round(w*max/h); h=max; }
      const c = document.createElement("canvas");
      c.width=w; c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);
      res(c.toDataURL("image/jpeg",0.72));
    };
    img.onerror = ()=>{ URL.revokeObjectURL(url); res(null); };
    img.src = url;
  });
}

/* ---- render ---- */
const PREVIEW_LIMIT = 4;           // 미리보기로 보여줄 사진 수
const expandedDays = new Set();    // 펼쳐진 날짜 기억(임시)

function render(){
  const album = document.getElementById("album");
  const empty = document.getElementById("empty");
  document.getElementById("babyNameText").textContent = data.name;

  // group photos by date
  const groups = {};
  for(const p of data.photos){ (groups[p.date] ||= []).push(p); }
  // include dates that only have comments
  for(const d in data.comments){ if((data.comments[d]||[]).length && !groups[d]) groups[d]=[]; }

  const dates = Object.keys(groups).sort((a,b)=> b.localeCompare(a));
  empty.style.display = dates.length ? "none":"block";
  album.innerHTML = "";

  dates.forEach((d,i)=>{
    const photos = groups[d];
    const comments = data.comments[d] || [];
    const day = document.createElement("div");
    day.className="day";

    let photoHTML = "";
    if(photos.length){
      const expanded = expandedDays.has(d);
      const collapsed = !expanded && photos.length > PREVIEW_LIMIT;
      const show = collapsed ? photos.slice(0, PREVIEW_LIMIT) : photos;
      const hidden = photos.length - PREVIEW_LIMIT; // 마지막 칸에 덮어 표시할 수
      photoHTML = `<div class="grid">` + show.map((p,idx)=>{
        const isLast = collapsed && idx === PREVIEW_LIMIT-1;
        const overlay = isLast
          ? `<button class="more" data-more="${d}"><b>+${hidden}</b><span>모두 보기</span></button>` : "";
        return `<div class="photo">
          <img src="${p.src}" data-full="${p.src}" loading="lazy" alt=""/>
          ${overlay}
          <button class="del" data-del="${p.id}" title="삭제">×</button>
        </div>`;
      }).join("") + `</div>`;
      if(expanded && photos.length > PREVIEW_LIMIT){
        photoHTML += `<button class="collapse" data-collapse="${d}">접기 ▲</button>`;
      }
    }

    let commentHTML = comments.map(c=>`
      <div class="comment">
        <div class="ava">💬</div>
        <div class="body">
          <div class="txt">${esc(c.text)}</div>
          <div class="time">${c.time}</div>
        </div>
        <button class="cdel" data-cdel="${c.id}" data-cdate="${d}">삭제</button>
      </div>`).join("");

    day.innerHTML = `
      <div class="day-head">
        <span class="day-dot" style="background:${dotColors[i%dotColors.length]}"></span>
        <div>
          <div class="day-date">${fmtDate(d)}</div>
          <div class="day-sub">사진 ${photos.length}장 · 코멘트 ${comments.length}개</div>
        </div>
        <span class="day-count">${photos.length}📷</span>
      </div>
      ${photoHTML}
      <div class="comments">
        ${commentHTML}
        <div class="addcomment">
          <input type="text" placeholder="이 날의 이야기를 남겨보세요…" data-cinput="${d}" />
          <button data-cadd="${d}">남기기</button>
        </div>
      </div>`;
    album.appendChild(day);
  });
}

function esc(s){return s.replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

/* ---- events ---- */
document.getElementById("addBtn").onclick = ()=> document.getElementById("fileInput").click();
document.getElementById("syncBtn").onclick = ()=> connectDrive();

document.getElementById("fileInput").onchange = async (e)=>{
  const files = [...e.target.files];
  e.target.value="";
  if(!files.length) return;
  toast("사진 날짜를 읽는 중…");
  let added=0;
  for(const f of files){
    if(!f.type.startsWith("image/")) continue;
    const date = await getPhotoDate(f);   // 사진 자체의 촬영/저장 날짜
    const src = await compress(f);
    if(src){ data.photos.push({id:uid(), date, src}); added++; }
  }
  save(); render();
  toast(added?`${added}장을 날짜별로 정리했어요 💕`:"사진을 담지 못했어요");
};

// delegated clicks
document.getElementById("album").addEventListener("click",(e)=>{
  const more = e.target.closest("[data-more]");
  if(more){ expandedDays.add(more.getAttribute("data-more")); render(); return; }
  const collapse = e.target.closest("[data-collapse]");
  if(collapse){ expandedDays.delete(collapse.getAttribute("data-collapse")); render(); return; }
  const del = e.target.closest("[data-del]");
  if(del){
    if(confirm("이 사진을 삭제할까요?")){
      data.photos = data.photos.filter(p=>p.id!==del.getAttribute("data-del"));
      save(); render();
    }
    return;
  }
  const cdel = e.target.closest("[data-cdel]");
  if(cdel){
    const d = cdel.getAttribute("data-cdate");
    data.comments[d] = (data.comments[d]||[]).filter(c=>c.id!==cdel.getAttribute("data-cdel"));
    save(); render();
    return;
  }
  const cadd = e.target.closest("[data-cadd]");
  if(cadd){ addComment(cadd.getAttribute("data-cadd")); return; }
  const full = e.target.closest("[data-full]");
  if(full){ openLB(full.getAttribute("data-full")); return; }
});
// enter to add comment
document.getElementById("album").addEventListener("keydown",(e)=>{
  const inp = e.target.getAttribute && e.target.getAttribute("data-cinput");
  if(inp && e.key==="Enter"){ addComment(inp); }
});

function addComment(date){
  const input = document.querySelector(`[data-cinput="${date}"]`);
  const text = (input.value||"").trim();
  if(!text) return;
  const now = new Date();
  const time = `${now.getMonth()+1}월 ${now.getDate()}일 ${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`;
  (data.comments[date] ||= []).push({id:uid(), text, time});
  save(); render();
}

/* lightbox */
function openLB(src){ document.getElementById("lbImg").src=src; document.getElementById("lb").classList.add("show"); }
document.getElementById("lbX").onclick = ()=> document.getElementById("lb").classList.remove("show");
document.getElementById("lb").onclick = (e)=>{ if(e.target.id==="lb") e.currentTarget.classList.remove("show"); };

/* name edit */
document.getElementById("babyName").onclick = ()=>{
  document.getElementById("namePick").value = data.name;
  showModal("nameModal");
  setTimeout(()=>document.getElementById("namePick").focus(),50);
};
document.getElementById("nameOk").onclick = ()=>{
  const v = document.getElementById("namePick").value.trim();
  if(v){ data.name=v; save(); render(); }
  hideModal("nameModal");
};
document.getElementById("nameCancel").onclick = ()=> hideModal("nameModal");

/* backup export/import */
document.getElementById("exportBtn").onclick = ()=>{
  const blob = new Blob([JSON.stringify(data)],{type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `babyalbum-${todayStr()}.json`;
  a.click();
  toast("백업 파일을 저장했어요 💾");
};
document.getElementById("importBtn").onclick = ()=> document.getElementById("importInput").click();
document.getElementById("importInput").onchange = (e)=>{
  const f = e.target.files[0]; e.target.value="";
  if(!f) return;
  const r = new FileReader();
  r.onload = ()=>{
    try{
      const d = JSON.parse(r.result);
      if(d && Array.isArray(d.photos)){
        if(confirm("현재 앨범을 백업 내용으로 바꿀까요?")){
          data = d; save(); render(); toast("백업을 불러왔어요 ✨");
        }
      }else toast("올바른 백업 파일이 아니에요");
    }catch(err){ toast("파일을 읽지 못했어요"); }
  };
  r.readAsText(f);
};

/* helpers */
function showModal(id){ document.getElementById(id).classList.add("show"); }
function hideModal(id){ document.getElementById(id).classList.remove("show"); }
let toastTimer;
function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove("show"),2200);
}

render();

// 구글 드라이브에 이미 연결한 적 있으면 자동 복원, 아니면 안내
if(driveConnected()) restoreDrive();
else if(driveConfigured()) setSync("'☁ 구글 연결'을 누르면 어디서든 동기화돼요");
else setSync("이 기기에만 저장 중 · 구글 연결은 안내서 설정 후 가능");
</script>
